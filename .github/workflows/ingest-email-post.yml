name: Ingest Post From Webhook Email

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  repository_dispatch:
    types:
      - email_post_ingest
      - gmail_forwarded_email
  workflow_dispatch:
    inputs:
      payload_json:
        description: "JSON payload used for local/manual test runs"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install image optimizer
        run: npm install --no-save sharp

      - name: Build payload file
        env:
          PAYLOAD_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_json || toJson(github.event.client_payload) }}
        run: |
          if [ -z "$PAYLOAD_JSON" ]; then
            echo "Webhook payload is empty."
            exit 1
          fi
          printf '%s' "$PAYLOAD_JSON" > /tmp/email-post-payload.json

      - name: Ingest email payload into posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node scripts/ingest-email-post.js /tmp/email-post-payload.json

      - name: Commit and push changes
        run: |
          if git diff --quiet -- posts/places/posts-places.json images/places; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/places/posts-places.json images/places
          git commit -m "chore: ingest post from email webhook"
          git push