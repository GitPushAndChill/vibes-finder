<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <title>Home — Minimal Blog</title>

    <style>
      /* Map styling */
      #map { height: 400px; margin: 40px 0; border-radius: 10px; }
      #vibeFilter { margin-bottom: 20px; padding: 5px 10px; font-size: 16px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="logo" href="index.html"><img src="images/logo.png" alt="GP&C logo" class="logo-img" /></a>
            <nav class="main-nav" aria-label="Main Navigation">
                <a class="active" href="index.html">Home</a>
                <a href="about.html">About Me</a>
                <a href="blog.html">Vibes</a>
                <a href="reviews.html">Books</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 class="hero-title">Where the Vibes Live</h1>
            <p class="hero-sub">Cool bars. Soft cafés. Artsy spaces. Loud nights. Quiet corners.</p>
            <p class="hero-sub">This is your guide to the places that feel different — in the best way.</p>
        </section>

        <!-- Preview grid blijft zoals voorheen -->
        <section class="preview-grid" id="preview-grid">
            <!-- articles will be injected here by script -->
        </section>

        <!-- Vibe map section -->
        <section>
            <h2>Explore Posts by City & Vibe</h2>
            <div id="map"></div>
            <select id="vibeFilter">
                <option value="all">All Vibes</option>
                <option value="chill">Chill 😎</option>
                <option value="party">Party 🎉</option>
                <option value="artsy">Artsy 🎨</option>
            </select>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 Website of GitPushAndChill</p>
        </div>
    </footer>

    <!-- JS Libraries -->
    <script src="js/script.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
    const vibeIcons = {
        chill: '😎',
        cozy: '☕',
        energetic: '⚡',
        romantic: '💘',
        family: '👪',
        adventurous: '🧭',
        hipster: '🎩',
        party: '🎉',
        artsy: '🎨'
    };


    fetch('posts/places/posts-places.json')
      .then(res => res.json())
      .then(posts => {
        // Map setup
        const map = L.map('map').setView([52.1, 5.3], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        posts.forEach(post => {
            const emojiIcon = L.divIcon({
                html: `<div style="font-size:32px;">${vibeIcons[post.vibe]}</div>`,
                className: 'emoji-marker',
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            L.marker(post.coordinates, { icon: emojiIcon })
            .addTo(map)
            .bindPopup(`
                <strong>${post.city}</strong><br>
                ${post.title}<br>
                <img src="${post.images[0]}" width="150">
            `);
        });
      });
    </script>
</body>
</html>
