<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/script.js"></script>
  <title>Blog — Minimal Blog</title>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html"><img src="images/logo.png" alt="GP&C logo" class="logo-img" /></a>
      <nav class="main-nav" aria-label="Main Navigation">
        <a href="index.html">Home</a>
        <a class="active" href="blog.html">Vibes</a>
        <a href="about.html">About Me</a>
      </nav>
    </div>
  </header>

    <main class="container">
      <section style="padding:var(--space-l) 0;">
        <h1>Vibes</h1>
        <p style="color:var(--text-secondary); margin-top:var(--space-s);">A collection of posts about the places and moments that feel different — in the best way.</p>
      </section>

      <!-- Filters (blog page only) -->
      <section class="post-filters" aria-label="Post filters">
        <div class="filter-group">
          <label class="filter-label" for="city-filter">City</label>
          <input class="filter-input" id="city-filter" name="city" list="city-options" placeholder="Type to search…" autocomplete="off" />
          <datalist id="city-options"></datalist>
        </div>
        <div class="filter-group">
          <label class="filter-label" for="vibe-filter">Vibe</label>
          <input class="filter-input" id="vibe-filter" name="vibe" list="vibe-options" placeholder="Type to search…" autocomplete="off" />
          <datalist id="vibe-options"></datalist>
        </div>
      </section>

      <!-- All posts grid: shows all posts; filters apply -->
      <section class="preview-grid" id="all-posts-grid">
      <!-- articles will be injected here by script -->
      </section>
    </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Website of GitPushAndChill</p>
    </div>
  </footer>
</body>
</html>
